name: Benchmark

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - run: npm ci
      - name: Install benchmark deps
        run: npm --prefix benchmark ci

      - name: Run benchmark
        id: bench
        run: |
          set -o pipefail
          npm --prefix benchmark start 2>&1 | tee bench-output.txt

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output
          path: bench-output.txt
          retention-days: 30

      - name: Post benchmark to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('bench-output.txt', 'utf8');
            const body = [
              '### Benchmark results',
              '',
              '<details><summary>Click to expand</summary>',
              '',
              '```',
              output.slice(-60000),
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
